<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Åben Brewery — Label Generator</title>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto px-4 py-8">

        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black tracking-tight text-gray-900 mb-1">ÅBEN</h1>
            <p class="text-lg text-gray-500 uppercase tracking-widest">Brewery — Label Generator</p>
        </header>

        <!-- Mode switcher -->
        <div class="bg-white rounded-xl shadow p-5 mb-6">
            <div class="flex gap-4 justify-center">
                <button id="p5-mode"
                    class="mode-btn active px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-all">
                    ✏️  2D Label (p5.js)
                </button>
                <button id="three-mode"
                    class="mode-btn px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-green-600 hover:text-white transition-all">
                    📦  3D Product (Three.js)
                </button>
            </div>
        </div>

        <!-- Canvas area -->
        <div class="bg-white rounded-xl shadow p-6">
            <div id="canvas-container" class="flex justify-center items-center"></div>
            <div id="three-container"  class="hidden flex justify-center items-center"></div>
        </div>

        <!-- Design controls -->
        <div class="bg-white rounded-xl shadow p-6 mt-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Design Controls</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Background</label>
                    <input type="color" id="bg-color" class="w-full h-10 rounded cursor-pointer border-2 border-gray-200" value="#0d0d0d">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Primary Colour</label>
                    <input type="color" id="primary-color" class="w-full h-10 rounded cursor-pointer border-2 border-gray-200" value="#f59e0b">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Size — <span id="size-label">150</span></label>
                    <input type="range" id="size-slider" min="50" max="300" value="150" class="w-full accent-blue-600">
                </div>
            </div>
        </div>

    </div>

    <!-- Vite entry point (bundles everything locally) -->
    <script type="module" src="/main.js"></script>
</body>
</html>
